template_id: ${MANAGED_AGENT_TEMPLATE_ID}
spec:
  displayName: Managed Agents
  description: Sandbox template for the managed-agents wrapper warm process.
  mainContainer:
    image: ${MANAGED_AGENT_TEMPLATE_MAIN_IMAGE}
    resources:
      cpu: 500m
      memory: 2Gi
  warmProcesses:
    - type: cmd
      alias: agent-wrapper
      command:
        - node
        - src/index.js
      cwd: /app
      envVars:
        PORT: "${MANAGED_AGENT_TEMPLATE_WRAPPER_PORT}"
        AGENT_WRAPPER_STATE_DIR: ${MANAGED_AGENT_TEMPLATE_WORKSPACE_STATE_PATH}
  network:
    mode: block-all
  pool:
    minIdle: 1
    maxIdle: 2
