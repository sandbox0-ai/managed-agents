template_id: ${MANAGED_AGENT_TEMPLATE_ID}
spec:
  displayName: Managed Agents
  description: Sandbox template for the managed-agents wrapper warm process.
  mainContainer:
    image: ${MANAGED_AGENT_TEMPLATE_MAIN_IMAGE}
    resources:
      cpu: 500m
      memory: 2Gi
  warmProcesses:
    - type: cmd
      alias: agent-wrapper
      command:
        - node
        - src/index.js
      cwd: /app
      envVars:
        PORT: "${MANAGED_AGENT_TEMPLATE_WRAPPER_PORT}"
        AGENT_WRAPPER_STATE_DIR: ${MANAGED_AGENT_TEMPLATE_WORKSPACE_STATE_PATH}
        DEBUG_CLAUDE_AGENT_SDK: "1"
        CLAUDE_CODE_PROFILE_QUERY: "1"
        CLAUDE_CODE_PROFILE_STARTUP: "1"
  volumeMounts:
    - name: workspace
      mountPath: ${MANAGED_AGENT_TEMPLATE_WORKSPACE_MOUNT_PATH}
    - name: managed-env-apt
      mountPath: /opt/managed-env/apt
    - name: managed-env-cargo
      mountPath: /opt/managed-env/cargo
    - name: managed-env-gem
      mountPath: /opt/managed-env/gem
    - name: managed-env-go
      mountPath: /opt/managed-env/go
    - name: managed-env-npm
      mountPath: /opt/managed-env/npm
    - name: managed-env-pip
      mountPath: /opt/managed-env/pip
  network:
    mode: block-all
  pool:
    minIdle: 3
    maxIdle: 6
