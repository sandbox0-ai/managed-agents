template_id: ${MANAGED_AGENT_TEMPLATE_ID}
spec:
  displayName: Claude Managed Agent
  description: Sandbox template for the Claude managed-agent wrapper sidecar.
  mainContainer:
    image: ${MANAGED_AGENT_TEMPLATE_MAIN_IMAGE}
    resources:
      cpu: 250m
      memory: 1Gi
  sidecars:
    - name: agent-wrapper
      image: ${MANAGED_AGENT_TEMPLATE_SIDECAR_IMAGE}
      env:
        - name: PORT
          value: "${MANAGED_AGENT_TEMPLATE_WRAPPER_PORT}"
        - name: AGENT_WRAPPER_STATE_DIR
          value: ${MANAGED_AGENT_TEMPLATE_ENGINE_STATE_MOUNT_PATH}
      resources:
        cpu: 250m
        memory: 1Gi
      mounts:
        - name: workspace
          mountPath: ${MANAGED_AGENT_TEMPLATE_WORKSPACE_MOUNT_PATH}
        - name: engine-state
          mountPath: ${MANAGED_AGENT_TEMPLATE_ENGINE_STATE_MOUNT_PATH}
      readinessProbe:
        httpGet:
          path: /healthz
          port: ${MANAGED_AGENT_TEMPLATE_WRAPPER_PORT}
        initialDelaySeconds: 2
        periodSeconds: 2
  sharedVolumes:
    - name: workspace
      mountPath: ${MANAGED_AGENT_TEMPLATE_WORKSPACE_MOUNT_PATH}
    - name: engine-state
      mountPath: ${MANAGED_AGENT_TEMPLATE_ENGINE_STATE_MOUNT_PATH}
  network:
    mode: allow-all
  pool:
    minIdle: 1
    maxIdle: 2
