                    description: Human-readable name. 1-256 characters. Omit to preserve. Cannot be cleared.
                    maxLength: 256
                    type: string
                skills:
                    description: Skills. Full replacement. Omit to preserve; send empty array or null to clear. Maximum 20.
                    items:
                        $ref: '#/components/schemas/BetaManagedAgentsSkillParams'
                    nullable: true
                    type: array
                system:
                    description: System prompt. Up to 100,000 characters. Omit to preserve; send empty string or null to clear.
                    example: You are a general-purpose agent that can research, write code, run commands, and use connected tools to complete the user's task end to end.
                    maxLength: 100000
                    nullable: true
                    type: string
                tools:
                    description: Tool configurations available to the agent. Full replacement. Omit to preserve; send empty array or null to clear. Maximum of 128 tools across all toolsets allowed.
                    items:
                        $ref: '#/components/schemas/BetaManagedAgentsAgentToolParams'
                    nullable: true
                    type: array
                version:
                    description: The agent's current version, used to prevent concurrent overwrites. Obtain this value from a create or retrieve response. The request fails if this does not match the server's current version.
