                    type: boolean
                last_id:
                    description: ID of the last file in this page of results.
                    example: file_013Zva2CMHLNnXjNJJKqJ2EF
                    nullable: true
                    title: Last Id
                    type: string
            required:
                - data
            title: FileListResponse
            type: object
        BetaFileMetadataSchema:
            properties:
                created_at:
                    description: RFC 3339 datetime string representing when the file was created.
                    example: "2025-04-15T18:37:24.100435Z"
                    format: date-time
                    title: Created At
                    type: string
                downloadable:
                    default: false
                    description: Whether the file can be downloaded.
                    example: false
                    title: Downloadable
                    type: boolean
                filename:
                    description: Original filename of the uploaded file.
                    example: document.pdf
                    maxLength: 500
                    minLength: 1
                    title: Filename
                    type: string
                id:
                    description: |-
                        Unique object identifier.

                        The format and length of IDs may change over time.
                    example: file_011CNha8iCJcU1wXNR6q4V8w
                    title: Id
                    type: string
                mime_type:
                    description: MIME type of the file.
                    example: application/pdf
                    maxLength: 255
                    minLength: 1
                    title: Mime Type
                    type: string
                scope:
                    $ref: '#/components/schemas/BetaFileScope'
                    description: The scope of this file, indicating the context in which it was created (e.g., a session).
                    nullable: true
                size_bytes:
                    description: Size of the file in bytes.
                    example: 102400
                    minimum: 0
                    title: Size Bytes
                    type: integer
                type:
                    description: |-
                        Object type.

                        For files, this is always `"file"`.
                    enum:
                        - file
                    title: Type
                    type: string
            required:
                - created_at
                - filename
                - id
                - mime_type
                - size_bytes
                - type
            title: FileMetadataSchema
            type: object
        BetaFileScope:
            properties:
                id:
                    description: The ID of the scoping resource (e.g., the session ID).
                    title: Id
                    type: string
                type:
                    description: The type of scope (e.g., `"session"`).
                    enum:
                        - session
                    title: Type
                    type: string
            required:
                - id
                - type
            title: FileScope
            type: object
        BetaGatewayTimeoutError:
            properties:
                message:
                    default: Request timeout
                    title: Message
                    type: string
                type:
