components:
    schemas:
        AnthropicBeta:
            anyOf:
                - type: string
                - enum:
                    - message-batches-2024-09-24
                    - prompt-caching-2024-07-31
                    - computer-use-2024-10-22
                    - computer-use-2025-01-24
                    - pdfs-2024-09-25
                    - token-counting-2024-11-01
                    - token-efficient-tools-2025-02-19
                    - output-128k-2025-02-19
                    - files-api-2025-04-14
                    - mcp-client-2025-04-04
                    - mcp-client-2025-11-20
                    - dev-full-thinking-2025-05-14
                    - interleaved-thinking-2025-05-14
                    - code-execution-2025-05-22
                    - extended-cache-ttl-2025-04-11
                    - context-1m-2025-08-07
                    - context-management-2025-06-27
                    - model-context-window-exceeded-2025-08-26
                    - skills-2025-10-02
                    - fast-mode-2026-02-01
                    - output-300k-2026-03-24
                    - advisor-tool-2026-03-01
                  type: string
                  x-stainless-nominal: false
        BetaAPIError:
            properties:
                message:
                    default: Internal server error
                    title: Message
                    type: string
                type:
                    default: api_error
                    enum:
                        - api_error
                    title: Type
                    type: string
            required:
                - message
                - type
            title: APIError
            type: object
        BetaAuthenticationError:
            properties:
                message:
                    default: Authentication error
                    title: Message
                    type: string
                type:
                    default: authentication_error
                    enum:
                        - authentication_error
                    title: Type
                    type: string
            required:
                - message
                - type
            title: AuthenticationError
            type: object
        BetaBillingError:
            properties:
                message:
                    default: Billing error
                    title: Message
                    type: string
                type:
                    default: billing_error
                    enum:
                        - billing_error
                    title: Type
                    type: string
            required:
                - message
                - type
            title: BillingError
            type: object
        BetaBody_create_skill_v1_skills_post:
            properties:
                display_title:
                    description: |-
                        Display title for the skill.

                        This is a human-readable label that is not included in the prompt sent to the model.
                    nullable: true
                    title: Display Title
                    type: string
                files:
                    description: |-
                        Files to upload for the skill.

                        All files must be in the same top-level directory and must include a SKILL.md file at the root of that directory.
                    items:
                        format: binary
                        type: string
                    nullable: true
                    title: Files
                    type: array
            title: Body_create_skill_v1_skills_post
            type: object
        BetaBody_create_skill_version_v1_skills__skill_id__versions_post:
            properties:
                files:
                    description: |-
                        Files to upload for the skill.

                        All files must be in the same top-level directory and must include a SKILL.md file at the root of that directory.
                    items:
                        format: binary
                        type: string
                    nullable: true
                    title: Files
                    type: array
            title: Body_create_skill_version_v1_skills__skill_id__versions_post
            type: object
        BetaCloudConfig:
            description: '`cloud` environment configuration.'
            example:
                networking:
                    allow_mcp_servers: false
                    allow_package_managers: true
                    allowed_hosts:
                        - api.example.com
                    type: limited
                packages:
                    apt: []
                    cargo: []
                    gem: []
                    go: []
                    npm: []
                    pip:
                        - pandas
                        - numpy
                    type: packages
                type: cloud
            properties:
                networking:
                    description: Network configuration policy.
                    discriminator:
                        mapping:
                            limited: '#/components/schemas/BetaLimitedNetwork'
                            unrestricted: '#/components/schemas/BetaUnrestrictedNetwork'
                        propertyName: type
                    example:
                        allow_mcp_servers: false
                        allow_package_managers: true
                        allowed_hosts:
                            - api.example.com
                        type: limited
                    oneOf:
                        - $ref: '#/components/schemas/BetaUnrestrictedNetwork'
                        - $ref: '#/components/schemas/BetaLimitedNetwork'
                    title: Networking
                packages:
                    $ref: '#/components/schemas/BetaPackages'
                    description: Package manager configuration.
                    example:
                        apt: []
                        cargo: []
                        gem: []
                        go: []
                        npm: []
                        pip:
                            - pandas
                            - numpy
                        type: packages
                type:
                    description: Environment type
                    enum:
                        - cloud
                    example: cloud
                    title: Type
                    type: string
            required:
                - networking
                - packages
                - type
            title: CloudConfig
            type: object
        BetaCloudConfigParams:
            additionalProperties: false
            description: |-
                Request params for `cloud` environment configuration.

                Fields default to null; on update, omitted fields preserve the
                existing value.
            example:
                networking:
                    allow_package_managers: true
                    allowed_hosts:
                        - api.example.com
                    type: limited
                packages:
                    pip:
                        - pandas
                        - numpy
                type: cloud
            properties:
                networking:
                    description: Network configuration policy. Omit on update to preserve the existing value.
                    discriminator:
                        mapping:
                            limited: '#/components/schemas/BetaLimitedNetworkParams'
                            unrestricted: '#/components/schemas/BetaUnrestrictedNetwork'
                        propertyName: type
                    example:
                        allow_package_managers: true
                        allowed_hosts:
                            - api.example.com
                        type: limited
                    nullable: true
                    oneOf:
                        - $ref: '#/components/schemas/BetaUnrestrictedNetwork'
                        - $ref: '#/components/schemas/BetaLimitedNetworkParams'
                    title: Networking
                packages:
                    $ref: '#/components/schemas/BetaPackagesParams'
                    description: Package manager configuration. Omit on update to preserve the existing value.
                    example:
                        pip:
                            - pandas
                            - numpy
                    nullable: true
                type:
                    description: Environment type
                    enum:
                        - cloud
                    example: cloud
                    title: Type
                    type: string
            required:
                - type
            title: CloudConfigParams
            type: object
        BetaCreateSkillResponse:
            properties:
                created_at:
                    description: ISO 8601 timestamp of when the skill was created.
                    example: "2024-10-30T23:58:27.427722Z"
                    title: Created At
                    type: string
                display_title:
                    description: |-
                        Display title for the skill.

                        This is a human-readable label that is not included in the prompt sent to the model.
                    example: My Custom Skill
                    nullable: true
                    title: Display Title
                    type: string
                id:
                    description: |-
                        Unique identifier for the skill.

                        The format and length of IDs may change over time.
                    example: skill_01JAbcdefghijklmnopqrstuvw
                    title: Id
                    type: string
                latest_version:
                    description: |-
                        The latest version identifier for the skill.

                        This represents the most recent version of the skill that has been created.
                    example: "1759178010641129"
                    nullable: true
                    title: Latest Version
                    type: string
                source:
                    description: |-
                        Source of the skill.

                        This may be one of the following values:
                        * `"custom"`: the skill was created by a user
                        * `"anthropic"`: the skill was created by Anthropic
                    example: custom
                    title: Source
                    type: string
                type:
                    default: skill
                    description: |-
                        Object type.

                        For Skills, this is always `"skill"`.
                    title: Type
                    type: string
                updated_at:
                    description: ISO 8601 timestamp of when the skill was last updated.
                    example: "2024-10-30T23:58:27.427722Z"
                    title: Updated At
                    type: string
            required:
                - created_at
                - display_title
                - id
                - latest_version
                - source
                - type
                - updated_at
            title: CreateSkillResponse
            type: object
        BetaCreateSkillVersionResponse:
            properties:
                created_at:
                    description: ISO 8601 timestamp of when the skill version was created.
                    example: "2024-10-30T23:58:27.427722Z"
                    title: Created At
                    type: string
                description:
                    description: |-
                        Description of the skill version.

                        This is extracted from the SKILL.md file in the skill upload.
                    example: A custom skill for doing something useful
                    title: Description
                    type: string
                directory:
                    description: |-
                        Directory name of the skill version.

                        This is the top-level directory name that was extracted from the uploaded files.
                    example: my-skill
                    title: Directory
                    type: string
                id:
                    description: |-
                        Unique identifier for the skill version.

                        The format and length of IDs may change over time.
                    example: skillver_01JAbcdefghijklmnopqrstuvw
                    title: Id
                    type: string
                name:
                    description: |-
                        Human-readable name of the skill version.

                        This is extracted from the SKILL.md file in the skill upload.
                    example: my-skill
                    title: Name
                    type: string
                skill_id:
                    description: Identifier for the skill that this version belongs to.
                    example: skill_01JAbcdefghijklmnopqrstuvw
                    title: Skill Id
                    type: string
                type:
                    default: skill_version
                    description: |-
                        Object type.

                        For Skill Versions, this is always `"skill_version"`.
                    title: Type
                    type: string
                version:
                    description: |-
                        Version identifier for the skill.

                        Each version is identified by a Unix epoch timestamp (e.g., "1759178010641129").
                    example: "1759178010641129"
                    title: Version
                    type: string
            required:
                - created_at
                - description
                - directory
                - id
                - name
                - skill_id
                - type
                - version
            title: CreateSkillVersionResponse
            type: object
        BetaDeleteSkillResponse:
            properties:
                id:
                    description: |-
                        Unique identifier for the skill.

                        The format and length of IDs may change over time.
                    example: skill_01JAbcdefghijklmnopqrstuvw
                    title: Id
                    type: string
                type:
                    default: skill_deleted
                    description: |-
                        Deleted object type.

                        For Skills, this is always `"skill_deleted"`.
                    title: Type
                    type: string
            required:
                - id
                - type
            title: DeleteSkillResponse
            type: object
        BetaDeleteSkillVersionResponse:
            properties:
                id:
                    description: |-
                        Version identifier for the skill.

                        Each version is identified by a Unix epoch timestamp (e.g., "1759178010641129").
                    example: "1759178010641129"
                    title: Id
                    type: string
                type:
                    default: skill_version_deleted
                    description: |-
                        Deleted object type.

                        For Skill Versions, this is always `"skill_version_deleted"`.
                    title: Type
                    type: string
            required:
                - id
                - type
            title: DeleteSkillVersionResponse
            type: object
        BetaEnvironment:
            description: Unified Environment resource for both cloud and BYOC environments.
            example:
                archived_at: null
                config:
                    networking:
                        allow_mcp_servers: false
                        allow_package_managers: true
                        allowed_hosts:
                            - api.example.com
                        type: limited
                    packages:
                        apt: []
                        cargo: []
                        gem: []
                        go: []
                        npm: []
                        pip:
                            - pandas
                            - numpy
                        type: packages
                    type: cloud
                created_at: "2026-03-15T10:00:00Z"
                description: Python environment with data-analysis packages.
                id: env_011CZkZ9X2dpNyB7HsEFoRfW
                metadata: {}
                name: python-data-analysis
                type: environment
                updated_at: "2026-03-15T10:00:00Z"
            properties:
                archived_at:
                    description: RFC 3339 timestamp when environment was archived, or null if not archived
                    example: null
                    nullable: true
                    title: Archived At
                    type: string
                config:
                    description: Environment configuration (either Anthropic Cloud or BYOC)
                    discriminator:
                        mapping:
                            cloud: '#/components/schemas/BetaCloudConfig'
                        propertyName: type
                    example:
                        networking:
                            allow_mcp_servers: false
                            allow_package_managers: true
                            allowed_hosts:
                                - api.example.com
                            type: limited
                        packages:
                            apt: []
                            cargo: []
                            gem: []
                            go: []
                            npm: []
                            pip:
                                - pandas
                                - numpy
                            type: packages
                        type: cloud
                    oneOf:
                        - $ref: '#/components/schemas/BetaCloudConfig'
                    title: Config
                created_at:
                    description: RFC 3339 timestamp when environment was created
                    example: "2026-03-15T10:00:00Z"
                    title: Created At
                    type: string
                description:
                    description: User-provided description for the environment
                    example: Python environment with data-analysis packages.
                    title: Description
                    type: string
                id:
                    description: Environment identifier (e.g., 'env_...')
                    example: env_011CZkZ9X2dpNyB7HsEFoRfW
                    title: Id
                    type: string
                metadata:
                    additionalProperties:
                        type: string
                    description: User-provided metadata key-value pairs
                    example:
                        key: value
                    title: Metadata
                    type: object
                name:
                    description: Human-readable name for the environment
                    example: python-data-analysis
                    title: Name
                    type: string
                type:
                    default: environment
                    description: The type of object (always 'environment')
                    enum:
                        - environment
                    example: environment
                    title: Type
                    type: string
                updated_at:
                    description: RFC 3339 timestamp when environment was last updated
                    example: "2026-03-15T10:00:00Z"
                    title: Updated At
                    type: string
            required:
                - archived_at
                - config
                - created_at
                - description
                - id
                - metadata
                - name
                - type
                - updated_at
            title: Environment
            type: object
        BetaEnvironmentDeleteResponse:
            description: Response after deleting an environment.
            example:
                id: env_011CZkZ9X2dpNyB7HsEFoRfW
                type: environment_deleted
            properties:
                id:
                    description: Environment identifier
                    example: env_011CZkZ9X2dpNyB7HsEFoRfW
                    title: Id
                    type: string
                type:
                    default: environment_deleted
                    description: The type of response
                    enum:
                        - environment_deleted
                    example: environment_deleted
                    title: Type
                    type: string
            required:
                - id
                - type
            title: EnvironmentDeleteResponse
            type: object
        BetaEnvironmentListResponse:
            description: |-
                Response when listing environments.

                This response model uses opaque cursor-based pagination. Use the `page`
                query parameter with the value from `next_page` to fetch the next page.
            properties:
                data:
                    description: List of environments.
                    items:
                        $ref: '#/components/schemas/BetaEnvironment'
                    title: Data
                    type: array
                    x-stainless-pagination-property:
                        purpose: items
                next_page:
                    description: Token for fetching the next page of results. If `null`, there are no more results available. Pass this value to the `page` parameter in the next request.
                    example: page_MjAyNS0wNS0xNFQwMDowMDowMFo=
                    nullable: true
                    title: Next Page
                    type: string
                    x-stainless-pagination-property:
                        purpose: next_cursor_field
            required:
                - data
                - next_page
            title: EnvironmentListResponse
            type: object
        BetaErrorResponse:
            properties:
                error:
                    discriminator:
                        mapping:
                            api_error: '#/components/schemas/BetaAPIError'
                            authentication_error: '#/components/schemas/BetaAuthenticationError'
                            billing_error: '#/components/schemas/BetaBillingError'
                            invalid_request_error: '#/components/schemas/BetaInvalidRequestError'
                            not_found_error: '#/components/schemas/BetaNotFoundError'
                            overloaded_error: '#/components/schemas/BetaOverloadedError'
                            permission_error: '#/components/schemas/BetaPermissionError'
                            rate_limit_error: '#/components/schemas/BetaRateLimitError'
                            timeout_error: '#/components/schemas/BetaGatewayTimeoutError'
                        propertyName: type
                    oneOf:
                        - $ref: '#/components/schemas/BetaInvalidRequestError'
                        - $ref: '#/components/schemas/BetaAuthenticationError'
                        - $ref: '#/components/schemas/BetaBillingError'
                        - $ref: '#/components/schemas/BetaPermissionError'
                        - $ref: '#/components/schemas/BetaNotFoundError'
                        - $ref: '#/components/schemas/BetaRateLimitError'
                        - $ref: '#/components/schemas/BetaGatewayTimeoutError'
                        - $ref: '#/components/schemas/BetaAPIError'
                        - $ref: '#/components/schemas/BetaOverloadedError'
                    title: Error
                request_id:
                    default: null
                    nullable: true
                    title: Request Id
                    type: string
                type:
                    default: error
                    enum:
                        - error
                    title: Type
                    type: string
            required:
                - error
                - request_id
                - type
            title: ErrorResponse
            type: object
        BetaFileDeleteResponse:
            properties:
