{{- if .Values.agentGateway.enabled }}
{{- $templateID := default .Values.agentGateway.env.claudeTemplate .Values.agentGateway.env.templateID }}
{{- $templateID = default "managed-agents" $templateID }}
{{- $sandbox0AuthBaseURL := default .Values.agentGateway.env.sandbox0BaseURL .Values.agentGateway.env.sandbox0AuthBaseURL }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "managed-agents.componentFullname" (list . "agent-gateway") }}
  labels:
    {{- include "managed-agents.componentLabels" (list . "agent-gateway") | nindent 4 }}
spec:
  replicas: {{ .Values.agentGateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "managed-agents.componentSelectorLabels" (list . "agent-gateway") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "managed-agents.componentSelectorLabels" (list . "agent-gateway") | nindent 8 }}
        {{- with .Values.agentGateway.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.agentGateway.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent-gateway
          image: "{{ .Values.agentGateway.image.repository }}:{{ .Values.agentGateway.image.tag }}"
          imagePullPolicy: {{ .Values.agentGateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.agentGateway.service.targetPort }}
          env:
            - name: MANAGED_AGENT_HTTP_ADDR
              value: {{ .Values.agentGateway.env.httpAddr | quote }}
            - name: MANAGED_AGENT_LOG_LEVEL
              value: {{ .Values.agentGateway.env.logLevel | quote }}
            - name: MANAGED_AGENT_DATABASE_SCHEMA
              value: {{ .Values.agentGateway.env.databaseSchema | quote }}
            - name: MANAGED_AGENT_DATABASE_MAX_CONNS
              value: {{ .Values.agentGateway.env.databaseMaxConns | quote }}
            - name: MANAGED_AGENT_DATABASE_MIN_CONNS
              value: {{ .Values.agentGateway.env.databaseMinConns | quote }}
            - name: MANAGED_AGENT_SANDBOX0_BASE_URL
              value: {{ .Values.agentGateway.env.sandbox0BaseURL | quote }}
            - name: MANAGED_AGENT_SANDBOX0_AUTH_BASE_URL
              value: {{ $sandbox0AuthBaseURL | quote }}
            - name: MANAGED_AGENT_SANDBOX0_EXPOSURE_BASE_URL
              value: {{ .Values.agentGateway.env.sandbox0ExposureBaseURL | quote }}
            - name: MANAGED_AGENT_SANDBOX0_TIMEOUT
              value: {{ .Values.agentGateway.env.sandbox0Timeout | quote }}
            - name: MANAGED_AGENT_RUNTIME_ENABLED
              value: {{ .Values.agentGateway.env.runtimeEnabled | quote }}
            - name: MANAGED_AGENT_RUNTIME_CALLBACK_BASE_URL
              value: {{ include "managed-agents.callbackBaseURL" . | quote }}
            - name: MANAGED_AGENT_RUNTIME_ALLOWED_DOMAINS
              value: {{ .Values.agentGateway.env.runtimeAllowedDomains | quote }}
            - name: MANAGED_AGENT_TEMPLATE_ID
              value: {{ $templateID | quote }}
            - name: MANAGED_AGENT_WRAPPER_PORT
              value: {{ .Values.agentGateway.env.wrapperPort | quote }}
            - name: MANAGED_AGENT_WORKSPACE_MOUNT_PATH
              value: {{ .Values.agentGateway.env.workspaceMountPath | quote }}
            - name: MANAGED_AGENT_SANDBOX_TTL_SECONDS
              value: {{ .Values.agentGateway.env.sandboxTTLSeconds | quote }}
            - name: MANAGED_AGENT_TEMPLATE_MANIFEST_PATH
              value: {{ .Values.agentGateway.env.templateManifestPath | quote }}
            - name: MANAGED_AGENT_TEMPLATE_MAIN_IMAGE
              value: {{ .Values.agentGateway.env.templateMainImage | quote }}
            - name: MANAGED_AGENT_OBSERVABILITY_ENABLED
              value: {{ .Values.agentGateway.env.observabilityEnabled | quote }}
            - name: MANAGED_AGENT_METRICS_ENABLED
              value: {{ .Values.agentGateway.env.metricsEnabled | quote }}
            - name: MANAGED_AGENT_TRACE_EXPORTER
              value: {{ .Values.agentGateway.env.traceExporter | quote }}
            - name: MANAGED_AGENT_TRACE_OTLP_ENDPOINT
              value: {{ .Values.agentGateway.env.traceOTLPEndpoint | quote }}
            - name: MANAGED_AGENT_TRACE_OTLP_INSECURE
              value: {{ .Values.agentGateway.env.traceOTLPInsecure | quote }}
            - name: MANAGED_AGENT_TRACE_SAMPLE_RATE
              value: {{ .Values.agentGateway.env.traceSampleRate | quote }}
            {{- if .Values.agentGateway.secretKeys.databaseURL.enabled }}
            - name: {{ .Values.agentGateway.secretKeys.databaseURL.envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.agentGateway.secretKeys.databaseURL.secretName }}
                  key: {{ .Values.agentGateway.secretKeys.databaseURL.key }}
            {{- end }}
            {{- if .Values.agentGateway.secretKeys.sandbox0AdminAPIKey.enabled }}
            - name: {{ .Values.agentGateway.secretKeys.sandbox0AdminAPIKey.envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.agentGateway.secretKeys.sandbox0AdminAPIKey.secretName }}
                  key: {{ .Values.agentGateway.secretKeys.sandbox0AdminAPIKey.key }}
            {{- end }}
            {{- with .Values.agentGateway.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if or .Values.agentGateway.envFromSecrets .Values.agentGateway.envFromConfigMaps }}
          envFrom:
            {{- range .Values.agentGateway.envFromSecrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
            {{- range .Values.agentGateway.envFromConfigMaps }}
            - configMapRef:
                name: {{ . }}
            {{- end }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.agentGateway.resources | nindent 12 }}
      {{- with .Values.agentGateway.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agentGateway.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agentGateway.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- if .Values.appGateway.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "managed-agents.componentFullname" (list . "app-gateway") }}
  labels:
    {{- include "managed-agents.componentLabels" (list . "app-gateway") | nindent 4 }}
spec:
  replicas: {{ .Values.appGateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "managed-agents.componentSelectorLabels" (list . "app-gateway") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "managed-agents.componentSelectorLabels" (list . "app-gateway") | nindent 8 }}
        {{- with .Values.appGateway.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.appGateway.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app-gateway
          image: "{{ .Values.appGateway.image.repository }}:{{ .Values.appGateway.image.tag }}"
          imagePullPolicy: {{ .Values.appGateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.appGateway.service.targetPort }}
          env:
            - name: APP_GATEWAY_HTTP_ADDR
              value: {{ .Values.appGateway.env.httpAddr | quote }}
            - name: APP_GATEWAY_STATE_DIR
              value: {{ .Values.appGateway.env.stateDir | quote }}
            - name: APP_GATEWAY_PUBLIC_RELAY_URL
              value: {{ include "managed-agents.appGatewayPublicRelayURL" . | quote }}
            - name: APP_GATEWAY_LOCAL_RELAY_URL
              value: {{ include "managed-agents.appGatewayLocalRelayURL" . | quote }}
            - name: MANAGED_AGENT_BASE_URL
              value: {{ default (include "managed-agents.agentGatewayBaseURL" .) .Values.appGateway.env.managedAgentBaseURL | quote }}
            {{- if .Values.appGateway.secretKeys.authToken.enabled }}
            - name: {{ .Values.appGateway.secretKeys.authToken.envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.appGateway.secretKeys.authToken.secretName }}
                  key: {{ .Values.appGateway.secretKeys.authToken.key }}
            {{- end }}
            {{- if .Values.appGateway.secretKeys.managedAgentAPIKey.enabled }}
            - name: {{ .Values.appGateway.secretKeys.managedAgentAPIKey.envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.appGateway.secretKeys.managedAgentAPIKey.secretName }}
                  key: {{ .Values.appGateway.secretKeys.managedAgentAPIKey.key }}
            {{- end }}
            {{- with .Values.appGateway.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if or .Values.appGateway.envFromSecrets .Values.appGateway.envFromConfigMaps }}
          envFrom:
            {{- range .Values.appGateway.envFromSecrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
            {{- range .Values.appGateway.envFromConfigMaps }}
            - configMapRef:
                name: {{ . }}
            {{- end }}
          {{- end }}
          volumeMounts:
            - name: app-gateway-state
              mountPath: {{ .Values.appGateway.env.stateDir | quote }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.appGateway.resources | nindent 12 }}
      volumes:
        - name: app-gateway-state
          {{- if or .Values.appGateway.persistence.enabled .Values.appGateway.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ include "managed-agents.appGatewayStateClaimName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.appGateway.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.appGateway.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.appGateway.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
