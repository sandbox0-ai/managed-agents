{{- if and .Values.sandboxTemplate.enabled .Values.sandboxTemplate.namespace.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.sandboxTemplate.namespace.name }}
  {{- with .Values.sandboxTemplate.namespace.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.sandboxTemplate.namespace.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
