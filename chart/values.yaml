nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

agentGateway:
  enabled: true
  replicaCount: 1
  image:
    repository: sandbox0ai/managed-agents
    tag: gateway-latest
    pullPolicy: IfNotPresent
  service:
    enabled: true
    type: ClusterIP
    port: 80
    targetPort: 8080
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: managed-agents.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  env:
    httpAddr: :8080
    logLevel: info
    databaseSchema: managed_agent
    databaseMaxConns: 10
    databaseMinConns: 1
    sandbox0BaseURL: https://api.sandbox0.ai
    # Defaults to sandbox0BaseURL when empty. Set this to the global gateway when sandbox0BaseURL points at a region gateway.
    sandbox0AuthBaseURL: ""
    # Optional internal gateway URL for sandbox public exposure forwarding.
    sandbox0ExposureBaseURL: ""
    sandbox0Timeout: 90s
    runtimeEnabled: true
    runtimeCallbackBaseURL: ""
    runtimeAllowedDomains: ""
    # Defaults to managed-agents when empty.
    templateID: ""
    # Deprecated: use templateID.
    claudeTemplate: ""
    wrapperPort: 8080
    workspaceMountPath: /workspace
    sandboxTTLSeconds: 180
    templateManifestPath: ""
    templateMainImage: sandbox0ai/managed-agents:wrapper-latest
    observabilityEnabled: true
    metricsEnabled: true
    traceExporter: noop
    traceOTLPEndpoint: ""
    traceOTLPInsecure: true
    traceSampleRate: 1
  extraEnv: []
  envFromSecrets: []
  envFromConfigMaps: []
  secretKeys:
    databaseURL:
      enabled: true
      envName: MANAGED_AGENT_DATABASE_URL
      secretName: managed-agents-runtime
      key: MANAGED_AGENT_DATABASE_URL
    sandbox0AdminAPIKey:
      enabled: true
      envName: MANAGED_AGENT_SANDBOX0_ADMIN_API_KEY
      secretName: managed-agents-runtime
      key: MANAGED_AGENT_SANDBOX0_ADMIN_API_KEY

appGateway:
  enabled: false
  replicaCount: 1
  image:
    repository: sandbox0ai/managed-agents
    tag: app-gateway-latest
    pullPolicy: IfNotPresent
  service:
    enabled: true
    type: ClusterIP
    port: 80
    targetPort: 8787
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: app-gateway.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  persistence:
    enabled: false
    existingClaim: ""
    size: 1Gi
    storageClassName: ""
  env:
    httpAddr: :8787
    stateDir: /var/lib/app-gateway
    # Defaults to appGateway ingress URL when ingress is enabled, otherwise empty.
    publicRelayURL: ""
    # Defaults to the in-pod HTTP listener converted to ws://127.0.0.1:{port}/relay.
    localRelayURL: ""
    # Defaults to the release-local agent-gateway service URL.
    managedAgentBaseURL: ""
  extraEnv: []
  envFromSecrets: []
  envFromConfigMaps: []
  secretKeys:
    authToken:
      enabled: false
      envName: APP_GATEWAY_AUTH_TOKEN
      secretName: managed-agents-app-gateway
      key: APP_GATEWAY_AUTH_TOKEN
    managedAgentAPIKey:
      enabled: false
      envName: MANAGED_AGENT_API_KEY
      secretName: managed-agents-app-gateway
      key: MANAGED_AGENT_API_KEY
