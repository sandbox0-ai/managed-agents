nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

agentGateway:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/sandbox0-ai/managed-agents/agent-gateway
    tag: latest
    pullPolicy: IfNotPresent
  service:
    enabled: true
    type: ClusterIP
    port: 80
    targetPort: 8080
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: managed-agents.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  env:
    httpAddr: :8080
    logLevel: info
    databaseSchema: managed_agent
    databaseMaxConns: 10
    databaseMinConns: 1
    sandbox0BaseURL: ""
    sandbox0Timeout: 60s
    runtimeEnabled: true
    runtimeRegionID: ""
    runtimeCallbackBaseURL: ""
    claudeTemplate: managed-agent-claude
    wrapperPort: 8080
    workspaceMountPath: /workspace
    engineStateMountPath: /var/lib/agent-wrapper
    sandboxTTLSeconds: 3600
    sandboxHardTTLSeconds: 21600
    anthropicSkillsBaseURL: ""
    anthropicSkillsVersion: ""
    anthropicSkillsTimeout: 15s
    templateManifestPath: ""
    templateMainImage: ghcr.io/sandbox0-ai/managed-agents/agent-wrapper-claude:latest
    templateSidecarImage: ghcr.io/sandbox0-ai/managed-agents/agent-wrapper-claude:latest
  extraEnv: []
  envFromSecrets: []
  envFromConfigMaps: []
  secretKeys:
    databaseURL:
      enabled: true
      envName: MANAGED_AGENT_DATABASE_URL
      secretName: managed-agents-runtime
      key: MANAGED_AGENT_DATABASE_URL
    anthropicSkillsAPIKey:
      enabled: false
      envName: MANAGED_AGENT_ANTHROPIC_SKILLS_API_KEY
      secretName: managed-agents-runtime
      key: MANAGED_AGENT_ANTHROPIC_SKILLS_API_KEY
