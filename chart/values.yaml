nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

agentGateway:
  enabled: true
  replicaCount: 1
  image:
    repository: sandbox0ai/managed-agents
    tag: gateway-latest
    pullPolicy: IfNotPresent
  service:
    enabled: true
    type: ClusterIP
    port: 80
    targetPort: 8080
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: managed-agents.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  env:
    httpAddr: :8080
    logLevel: info
    databaseSchema: managed_agent
    databaseMaxConns: 10
    databaseMinConns: 1
    sandbox0BaseURL: https://api.sandbox0.ai
    sandbox0Timeout: 90s
    runtimeEnabled: true
    runtimeCallbackBaseURL: ""
    claudeTemplate: managed-agent-claude
    wrapperPort: 8080
    workspaceMountPath: /workspace
    engineStateMountPath: /var/lib/agent-wrapper
    sandboxTTLSeconds: 0
    sandboxHardTTLSeconds: 3600
    templateManifestPath: ""
    templateMainImage: sandbox0ai/managed-agents:wrapper-latest
  extraEnv: []
  envFromSecrets: []
  envFromConfigMaps: []
  secretKeys:
    databaseURL:
      enabled: true
      envName: MANAGED_AGENT_DATABASE_URL
      secretName: managed-agents-runtime
      key: MANAGED_AGENT_DATABASE_URL
    sandbox0AdminAPIKey:
      enabled: false
      envName: MANAGED_AGENT_SANDBOX0_ADMIN_API_KEY
      secretName: managed-agents-runtime
      key: MANAGED_AGENT_SANDBOX0_ADMIN_API_KEY
