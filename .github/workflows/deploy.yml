name: Deploy

on:
  workflow_run:
    workflows:
      - Images
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag to deploy. Defaults to the triggering commit short SHA.
        required: false
        type: string

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      KUBECONFIG: /home/runner/.kube/config
      HELM_RELEASE: ${{ vars.MANAGED_AGENTS_HELM_RELEASE || 'managed-agents' }}
      KUBE_NAMESPACE: ${{ vars.MANAGED_AGENTS_KUBE_NAMESPACE || 'sandbox0-cloud' }}
      IMAGE_REPOSITORY: ${{ vars.MANAGED_AGENTS_IMAGE_REPOSITORY || 'sandbox0ai/managed-agents' }}
      SANDBOX0_BASE_URL: ${{ vars.MANAGED_AGENTS_SANDBOX0_BASE_URL || 'https://api.sandbox0.ai' }}
      RUNTIME_CALLBACK_BASE_URL: ${{ vars.MANAGED_AGENTS_RUNTIME_CALLBACK_BASE_URL || '' }}
      RUNTIME_ENABLED: ${{ vars.MANAGED_AGENTS_RUNTIME_ENABLED || 'true' }}
      CLAUDE_TEMPLATE: ${{ vars.MANAGED_AGENTS_CLAUDE_TEMPLATE || 'managed-agent-claude' }}
      INGRESS_ENABLED: ${{ vars.MANAGED_AGENTS_INGRESS_ENABLED || 'false' }}
      INGRESS_CLASS_NAME: ${{ vars.MANAGED_AGENTS_INGRESS_CLASS_NAME || 'nginx' }}
      INGRESS_HOST: ${{ vars.MANAGED_AGENTS_INGRESS_HOST || '' }}
      INGRESS_TLS_SECRET_NAME: ${{ vars.MANAGED_AGENTS_INGRESS_TLS_SECRET_NAME || '' }}
      DATABASE_URL: ${{ secrets.MANAGED_AGENTS_DATABASE_URL }}
      SANDBOX0_ADMIN_API_KEY: ${{ secrets.MANAGED_AGENTS_SANDBOX0_ADMIN_API_KEY }}
      ANTHROPIC_SKILLS_API_KEY: ${{ secrets.MANAGED_AGENTS_ANTHROPIC_SKILLS_API_KEY }}
      SMOKE_API_KEY: ${{ secrets.MANAGED_AGENTS_SMOKE_API_KEY }}

    steps:
      - name: Checkout managed-agents
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref_name }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.DO_KUBE_CONFIG }}" ]]; then
            echo "DO_KUBE_CONFIG secret is required."
            exit 1
          fi

          mkdir -p "$(dirname "${KUBECONFIG}")"
          printf '%s' "${{ secrets.DO_KUBE_CONFIG }}" > "${KUBECONFIG}"
          chmod 600 "${KUBECONFIG}"

      - name: Resolve image tag
        id: image
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${{ github.event.inputs.image_tag || '' }}" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="$(git rev-parse --short=7 HEAD)"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "gateway_tag=gateway-${TAG#gateway-}" >> "$GITHUB_OUTPUT"
          echo "wrapper_tag=wrapper-${TAG#wrapper-}" >> "$GITHUB_OUTPUT"

      - name: Validate required settings
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${DATABASE_URL}" ]]; then
            echo "MANAGED_AGENTS_DATABASE_URL secret is required."
            exit 1
          fi

          if [[ "${INGRESS_ENABLED}" == "true" && -z "${INGRESS_HOST}" ]]; then
            echo "MANAGED_AGENTS_INGRESS_HOST variable is required when ingress is enabled."
            exit 1
          fi

      - name: Ensure namespace exists
        shell: bash
        run: kubectl create namespace "${KUBE_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply runtime secret
        shell: bash
        run: |
          set -euo pipefail

          secret_args=(--from-literal=MANAGED_AGENT_DATABASE_URL="${DATABASE_URL}")
          if [[ -n "${ANTHROPIC_SKILLS_API_KEY}" ]]; then
            secret_args+=(--from-literal=MANAGED_AGENT_ANTHROPIC_SKILLS_API_KEY="${ANTHROPIC_SKILLS_API_KEY}")
          fi
          if [[ -n "${SANDBOX0_ADMIN_API_KEY}" ]]; then
            secret_args+=(--from-literal=MANAGED_AGENT_SANDBOX0_ADMIN_API_KEY="${SANDBOX0_ADMIN_API_KEY}")
          fi

          kubectl -n "${KUBE_NAMESPACE}" create secret generic managed-agents-runtime \
            "${secret_args[@]}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy chart
        shell: bash
        run: |
          set -euo pipefail

          helm_extra_args=(
            --set-string "agentGateway.env.runtimeEnabled=${RUNTIME_ENABLED}"
            --set-string "agentGateway.env.claudeTemplate=${CLAUDE_TEMPLATE}"
          )
          if [[ -n "${SANDBOX0_ADMIN_API_KEY}" ]]; then
            helm_extra_args+=(--set "agentGateway.secretKeys.sandbox0AdminAPIKey.enabled=true")
          fi

          make helm-upgrade \
            HELM_RELEASE="${HELM_RELEASE}" \
            KUBE_NAMESPACE="${KUBE_NAMESPACE}" \
            IMAGE_REPOSITORY="${IMAGE_REPOSITORY}" \
            GATEWAY_TAG="${{ steps.image.outputs.gateway_tag }}" \
            WRAPPER_TAG="${{ steps.image.outputs.wrapper_tag }}" \
            SANDBOX0_BASE_URL="${SANDBOX0_BASE_URL}" \
            RUNTIME_CALLBACK_BASE_URL="${RUNTIME_CALLBACK_BASE_URL}" \
            INGRESS_ENABLED="${INGRESS_ENABLED}" \
            INGRESS_CLASS_NAME="${INGRESS_CLASS_NAME}" \
            INGRESS_HOST="${INGRESS_HOST}" \
            INGRESS_TLS_SECRET_NAME="${INGRESS_TLS_SECRET_NAME}" \
            HELM_EXTRA_ARGS="${helm_extra_args[*]}"

      - name: Wait for rollout
        shell: bash
        run: kubectl -n "${KUBE_NAMESPACE}" rollout status deploy/${HELM_RELEASE}-agent-gateway --timeout=5m

      - name: Smoke health endpoint
        if: ${{ vars.MANAGED_AGENTS_INGRESS_HOST != '' }}
        shell: bash
        run: |
          set -euo pipefail

          curl --retry 12 --retry-all-errors --retry-delay 5 -fsS "https://${INGRESS_HOST}/healthz"

          if [[ -n "${SMOKE_API_KEY}" ]]; then
            curl --retry 12 --retry-all-errors --retry-delay 5 -fsS \
              -H "Authorization: Bearer ${SMOKE_API_KEY}" \
              -H "Anthropic-Beta: managed-agents-2026-04-01" \
              "https://${INGRESS_HOST}/v1/environments?limit=1" >/dev/null
          fi
