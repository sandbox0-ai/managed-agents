name: Images

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE_REPOSITORY: ${{ vars.MANAGED_AGENTS_IMAGE_REPOSITORY || 'sandbox0ai/managed-agents' }}

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: agent-gateway
            tag_prefix: gateway-
            latest_tag: gateway-latest
            dockerfile: ./Dockerfile
            context: .
            target: ""
            needs_sdk_go: true
          - image_name: agent-wrapper-claude
            tag_prefix: wrapper-
            latest_tag: wrapper-latest
            dockerfile: ./agent-wrapper/Dockerfile.claude
            context: ./agent-wrapper
            target: ""
            needs_sdk_go: false

    steps:
      - name: Checkout managed-agents
        uses: actions/checkout@v4

      - name: Checkout sdk-go sibling repo
        uses: actions/checkout@v4
        with:
          repository: sandbox0-ai/sdk-go
          path: sdk-go

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=sha,format=short,prefix=${{ matrix.tag_prefix }}
            type=raw,value=${{ matrix.latest_tag }},enable={{is_default_branch}}
            type=ref,event=tag,prefix=${{ matrix.tag_prefix }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-contexts: |
            sdk-go=${{ github.workspace }}/sdk-go
