name: Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      rebuild_wrapper_base:
        description: Build and publish wrapper-base-latest before app images.
        required: false
        type: boolean
        default: false

env:
  IMAGE_REPOSITORY: ${{ vars.MANAGED_AGENTS_IMAGE_REPOSITORY || 'sandbox0ai/managed-agents' }}

jobs:
  detect-wrapper-base:
    runs-on: ubuntu-latest
    outputs:
      rebuild: ${{ steps.detect.outputs.rebuild }}
    steps:
      - name: Checkout managed-agents
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect wrapper base changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          rebuild=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.rebuild_wrapper_base }}" == "true" ]]; then
            rebuild=true
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "branch" ]]; then
            if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
              changed_files="$(git diff-tree --no-commit-id --name-only -r "${GITHUB_SHA}")"
            else
              changed_files="$(git diff --name-only "${{ github.event.before }}" "${GITHUB_SHA}")"
            fi

            if grep -Eq '^(\.github/workflows/images\.yml|agent-wrapper/Dockerfile\.base)$' <<<"${changed_files}"; then
              rebuild=true
            fi
          fi

          echo "rebuild=${rebuild}" >> "${GITHUB_OUTPUT}"

  build-wrapper-base:
    needs: detect-wrapper-base
    if: needs.detect-wrapper-base.outputs.rebuild == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout managed-agents
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=sha,format=short,prefix=wrapper-base-
            type=raw,value=wrapper-base-latest,enable={{is_default_branch}}

      - name: Build and push wrapper base image
        uses: docker/build-push-action@v6
        with:
          context: ./agent-wrapper
          file: ./agent-wrapper/Dockerfile.base
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-images:
    needs:
      - detect-wrapper-base
      - build-wrapper-base
    if: >-
      always() &&
      needs.detect-wrapper-base.result == 'success' &&
      (needs.build-wrapper-base.result == 'success' ||
       needs.build-wrapper-base.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: agent-gateway
            tag_prefix: gateway-
            latest_tag: gateway-latest
            dockerfile: ./Dockerfile
            context: .
            target: ""
            needs_sdk_go: true
          - image_name: agent-wrapper-claude
            tag_prefix: wrapper-
            latest_tag: wrapper-latest
            dockerfile: ./agent-wrapper/Dockerfile.claude
            context: ./agent-wrapper
            target: ""
            needs_sdk_go: false

    steps:
      - name: Checkout managed-agents
        uses: actions/checkout@v4

      - name: Checkout sdk-go sibling repo
        uses: actions/checkout@v4
        with:
          repository: sandbox0-ai/sdk-go
          path: sdk-go

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=sha,format=short,prefix=${{ matrix.tag_prefix }}
            type=raw,value=${{ matrix.latest_tag }},enable={{is_default_branch}}
            type=ref,event=tag,prefix=${{ matrix.tag_prefix }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.image_name == 'agent-wrapper-claude' && format('WRAPPER_BASE_IMAGE={0}:wrapper-base-latest', env.IMAGE_REPOSITORY) || '' }}
          build-contexts: |
            sdk-go=${{ github.workspace }}/sdk-go
