name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      run_kind_e2e:
        description: Run the kind-based managed-agents e2e job.
        required: false
        type: boolean
        default: true

concurrency:
  group: managed-agents-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quick-check:
    name: quick-check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      MANAGED_AGENT_SPEC_TOKEN_PRESENT: ${{ secrets.MANAGED_AGENT_SPEC_TOKEN != '' }}
    steps:
      - name: Checkout managed-agents
        uses: actions/checkout@v4
        with:
          path: managed-agents

      - name: Checkout managed-agent-spec sibling repo
        if: env.MANAGED_AGENT_SPEC_TOKEN_PRESENT == 'true'
        uses: actions/checkout@v4
        with:
          repository: laotoutou/managed-agent-spec
          path: managed-agents-spec
          token: ${{ secrets.MANAGED_AGENT_SPEC_TOKEN }}

      - name: Checkout sdk-go sibling repo
        uses: actions/checkout@v4
        with:
          repository: sandbox0-ai/sdk-go
          path: sdk-go

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: managed-agents/go.mod
          cache-dependency-path: managed-agents/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            managed-agents/agent-wrapper/package-lock.json
            managed-agents/app-gateway/package-lock.json

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run quick verification
        working-directory: managed-agents
        env:
          SKIP_GENERATED_WHEN_SPEC_MISSING: "1"
        run: make verify

      - name: Show git diff on failure
        if: failure()
        working-directory: managed-agents
        shell: bash
        run: |
          git status --short
          git diff --stat

  postgres-integration:
    name: postgres-integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: managed_agents
          POSTGRES_USER: managed_agents
          POSTGRES_PASSWORD: managed_agents
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U managed_agents -d managed_agents"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout managed-agents
        uses: actions/checkout@v4
        with:
          path: managed-agents

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: managed-agents/go.mod
          cache-dependency-path: managed-agents/go.sum

      - name: Run database-backed tests
        working-directory: managed-agents
        env:
          TEST_DATABASE_URL: postgres://managed_agents:managed_agents@127.0.0.1:5432/managed_agents?sslmode=disable
        run: make test-integration

  kind-e2e:
    name: kind-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_kind_e2e == 'true'
    env:
      KIND_CLUSTER_NAME: managed-agents-e2e
      IMAGE_REPOSITORY: sandbox0ai/managed-agents
      GATEWAY_TAG: gateway-testenv
      FAKE_WRAPPER_IMAGE: managed-agents/fake-wrapper:e2e
    steps:
      - name: Checkout managed-agents
        uses: actions/checkout@v4
        with:
          path: managed-agents

      - name: Checkout sandbox0 latest manifests
        uses: actions/checkout@v4
        with:
          repository: sandbox0-ai/sandbox0
          ref: main
          path: sandbox0

      - name: Checkout sdk-go sibling repo
        uses: actions/checkout@v4
        with:
          repository: sandbox0-ai/sdk-go
          path: sdk-go

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: managed-agents/go.mod
          cache-dependency-path: managed-agents/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: managed-agents/tests/sdk-compat/package-lock.json

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Kind
        shell: bash
        run: |
          curl -fsSL -o kind https://kind.sigs.k8s.io/dl/v0.30.0/kind-linux-amd64
          chmod +x kind
          sudo mv kind /usr/local/bin/kind

      - name: Create Kind cluster
        shell: bash
        run: kind create cluster --name "${KIND_CLUSTER_NAME}" --config managed-agents/tests/e2e/kind-config.yaml

      - name: Build managed-agents test images
        working-directory: managed-agents
        env:
          SDK_GO_DIR: ${{ github.workspace }}/sdk-go
        run: |
          make docker-build-gateway
          make docker-build-fake-wrapper

      - name: Deploy sandbox0 latest and managed-agents
        working-directory: managed-agents
        env:
          SANDBOX0_DIR: ${{ github.workspace }}/sandbox0
        run: scripts/ci/deploy-kind-e2e.sh

      - name: Run managed-agents e2e tests
        working-directory: managed-agents
        run: scripts/ci/run-kind-e2e.sh

      - name: Dump cluster state on failure
        if: failure()
        shell: bash
        run: |
          kubectl get pods -A -o wide || true
          kubectl -n sandbox0-system get events --sort-by=.lastTimestamp || true
          kubectl -n sandbox0-cloud get events --sort-by=.lastTimestamp || true
          kubectl -n sandbox0-cloud logs deploy/managed-agents-agent-gateway --all-containers --tail=-1 || true
          kind export logs "${RUNNER_TEMP}/kind-logs" --name "${KIND_CLUSTER_NAME}" || true

      - name: Upload kind logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: managed-agents-kind-logs
          path: ${{ runner.temp }}/kind-logs
          if-no-files-found: ignore

  kind-e2e-live-dual-engine:
    name: kind-e2e-live-dual-engine
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: read
    if: (github.event_name != 'workflow_dispatch' || github.event.inputs.run_kind_e2e == 'true') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    env:
      KIND_CLUSTER_NAME: managed-agents-live-e2e
      IMAGE_REPOSITORY: sandbox0ai/managed-agents
      GATEWAY_TAG: gateway-live-testenv
      WRAPPER_TAG: wrapper-live-testenv
      MANAGED_AGENT_LIVE_CLAUDE_BASE_URL: ${{ vars.MANAGED_AGENT_LLM_BASE_URL }}
      MANAGED_AGENT_LIVE_CLAUDE_MODEL: ${{ vars.MANAGED_AGENT_LLM_MODEL }}
      MANAGED_AGENT_LIVE_CLAUDE_TOKEN: ${{ secrets.MANAGED_AGENT_LLM_TOKEN }}
      MANAGED_AGENT_LIVE_CODEX_BASE_URL: ${{ vars.MANAGED_AGENT_CODEX_LLM_BASE_URL }}
      MANAGED_AGENT_LIVE_CODEX_MODEL: ${{ vars.MANAGED_AGENT_CODEX_MODEL }}
      MANAGED_AGENT_LIVE_CODEX_TOKEN: ${{ secrets.MANAGED_AGENT_CODEX_LLM_TOKEN }}
    steps:
      - name: Checkout managed-agents
        uses: actions/checkout@v4
        with:
          path: managed-agents

      - name: Checkout sandbox0 latest manifests
        uses: actions/checkout@v4
        with:
          repository: sandbox0-ai/sandbox0
          ref: main
          path: sandbox0

      - name: Checkout sdk-go sibling repo
        uses: actions/checkout@v4
        with:
          repository: sandbox0-ai/sdk-go
          path: sdk-go

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: managed-agents/go.mod
          cache-dependency-path: managed-agents/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: managed-agents/tests/live-engines/package-lock.json

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Kind
        shell: bash
        run: |
          curl -fsSL -o kind https://kind.sigs.k8s.io/dl/v0.30.0/kind-linux-amd64
          chmod +x kind
          sudo mv kind /usr/local/bin/kind

      - name: Create Kind cluster
        shell: bash
        run: kind create cluster --name "${KIND_CLUSTER_NAME}" --config managed-agents/tests/e2e/kind-config.yaml

      - name: Verify live engine credentials are configured
        shell: bash
        run: |
          test -n "${MANAGED_AGENT_LIVE_CLAUDE_BASE_URL}"
          test -n "${MANAGED_AGENT_LIVE_CLAUDE_MODEL}"
          test -n "${MANAGED_AGENT_LIVE_CLAUDE_TOKEN}"
          test -n "${MANAGED_AGENT_LIVE_CODEX_BASE_URL}"
          test -n "${MANAGED_AGENT_LIVE_CODEX_MODEL}"
          test -n "${MANAGED_AGENT_LIVE_CODEX_TOKEN}"

      - name: Build managed-agents live images
        working-directory: managed-agents
        env:
          SDK_GO_DIR: ${{ github.workspace }}/sdk-go
        run: |
          make docker-build-gateway GATEWAY_TAG="${GATEWAY_TAG}"
          make docker-build-wrapper WRAPPER_TAG="${WRAPPER_TAG}"

      - name: Deploy sandbox0 latest and managed-agents
        working-directory: managed-agents
        env:
          SANDBOX0_DIR: ${{ github.workspace }}/sandbox0
          WRAPPER_IMAGE: ${{ env.IMAGE_REPOSITORY }}:${{ env.WRAPPER_TAG }}
        run: scripts/ci/deploy-kind-e2e.sh

      - name: Run managed-agents live engine e2e tests
        working-directory: managed-agents
        run: scripts/ci/run-kind-live-engines.sh

      - name: Dump cluster state on failure
        if: failure()
        shell: bash
        run: |
          kubectl get pods -A -o wide || true
          kubectl -n sandbox0-system get events --sort-by=.lastTimestamp || true
          kubectl -n sandbox0-cloud get events --sort-by=.lastTimestamp || true
          kubectl -n sandbox0-cloud logs deploy/managed-agents-agent-gateway --all-containers --tail=-1 || true
          kind export logs "${RUNNER_TEMP}/kind-live-logs" --name "${KIND_CLUSTER_NAME}" || true

      - name: Upload kind logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: managed-agents-kind-live-logs
          path: ${{ runner.temp }}/kind-live-logs
          if-no-files-found: ignore

      - name: Cleanup Kind cluster
        if: always()
        run: kind delete cluster --name "${KIND_CLUSTER_NAME}" || true
